services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_USER: timely
      POSTGRES_DB: timely
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timely"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
